name: Sharp Line Scanner

on:
  schedule:
    # Every 5 minutes between 11:00-23:00 UTC (football hours)
    - cron: '*/5 11-23 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no trades logged)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sharp_scan:
    runs-on: ubuntu-latest
    environment: sports
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run sharp line scanner
        env:
          ODDS_API_KEY:     ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python run_sharp.py --dry-run
          else
            python run_sharp.py
          fi

      - name: Commit updated trades and market state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add trades.json market_state.json
          git diff --staged --quiet || git commit -m "Sharp scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
